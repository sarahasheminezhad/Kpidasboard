<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستم رتبه‌بندی ماهانه KPI</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css');
        body { font-family: Vazirmatn, sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 950px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 10px; }

        /* نوار انتخاب ماه (آرشیو) */
        .month-bar { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .month-bar label { font-size: 14px; color: #555; }
        .month-bar select { padding: 8px 14px; border-radius: 6px; border: 1px solid #ccc; font-family: inherit; font-size: 14px; background: #fff; }
        .load-status { font-size: 13px; color: #7f8c8d; text-align: center; margin-bottom: 15px; min-height: 18px; }
        .load-status.error { color: #e74c3c; font-weight: bold; }

        /* بخش وضعیت من */
        .search-box { background: #eef2f7; padding: 20px; border-radius: 8px; margin-bottom: 25px; }
        select#userSelect { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-family: inherit; font-size: 16px; box-sizing: border-box; }

        /* کارت مشخصات کاربر */
        .result-card { display: none; margin-top: 15px; background: #fff; padding: 20px; border-right: 5px solid #3498db; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 6px; }
        .profile-area { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        .profile-photo {
            width: 64px; height: 64px; border-radius: 50%; object-fit: cover;
            border: 2px solid #eef2f7; background: #eef2f7; flex-shrink: 0;
        }
        .profile-photo.placeholder {
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: bold; color: #7f8c8d; background: #eef2f7;
        }
        .profile-info h4 { margin: 0 0 5px 0; font-size: 18px; color: #2c3e50; }

        .result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; text-align: center; }
        .metric { background: #f8f9fa; padding: 12px; border-radius: 6px; border: 1px solid #e1e8ed; }
        .metric-val { font-weight: bold; color: #2c3e50; font-size: 18px; margin-top: 5px; }

        /* استایل استیج‌ها */
        .stage { padding: 4px 10px; border-radius: 20px; font-size: 13px; color: white; display: inline-block; text-align: center; font-weight: bold; }
        .stage-1 { background-color: #95a5a6; }
        .stage-2 { background-color: #3498db; }
        .stage-3 { background-color: #f1c40f; color: #333; }
        .stage-4 { background-color: #9b59b6; }
        .stage-5 { background-color: #199609; }

        /* ساختار هرمی / بلوکی */
        .pyramid-container { display: flex; flex-direction: column; gap: 15px; margin-top: 25px; transition: all 0.3s ease; }

        .stage-block {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-right: 8px solid #ccc;
            transition: all 0.3s ease;
        }

        .stage-block[data-stage="5"] { border-right-color: #199609; }
        .stage-block[data-stage="4"] { border-right-color: #9b59b6; }
        .stage-block[data-stage="3"] { border-right-color: #f1c40f; }
        .stage-block[data-stage="2"] { border-right-color: #3498db; }
        .stage-block[data-stage="1"] { border-right-color: #95a5a6; }

        .stage-block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px dashed #eee;
            padding-bottom: 10px;
        }
        .stage-block-title { font-size: 18px; font-weight: bold; color: #2c3e50; }

        .users-list { display: flex; flex-wrap: wrap; gap: 10px; }

        /* استایل کارت هر فرد داخل بلوک، حالا با عکس کوچک */
        .user-chip {
            background: #f8f9fa;
            border: 1px solid #e1e8ed;
            padding: 6px 14px 6px 6px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .chip-photo {
            width: 30px; height: 30px; border-radius: 50%; object-fit: cover;
            background: #eef2f7; flex-shrink: 0;
        }
        .chip-photo.placeholder {
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold; color: #95a5a6;
        }
        .user-chip .rank-num { background: #eef2f7; border-radius: 4px; padding: 2px 6px; font-weight: bold; font-size: 12px; }
        .user-chip .user-score { color: #7f8c8d; font-size: 13px; }

        .pyramid-container.has-active .stage-block { opacity: 0.3; transform: scale(0.98); }
        .pyramid-container.has-active .stage-block.active-stage { opacity: 1; transform: scale(1); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        .pyramid-container.has-active .user-chip { opacity: 0.4; }
        .pyramid-container.has-active .user-chip.highlighted-user {
            opacity: 1;
            background: #fff;
            border-color: #2c3e50;
            box-shadow: 0 0 8px rgba(0,0,0,0.15);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 داشبورد رتبه‌بندی و عملکرد کارشناسان</h1>

    <!-- نوار انتخاب ماه: آرشیو ماه‌های قبل -->
    <div class="month-bar">
        <label for="monthSelect">ماه:</label>
        <select id="monthSelect" onchange="loadMonth(this.value)"></select>
    </div>
    <div id="loadStatus" class="load-status"></div>

    <!-- بخش وضعیت من -->
    <div class="search-box">
        <h3>🔍 وضعیت من را نشان بده</h3>
        <select id="userSelect" onchange="showUserStatus()">
            <option value="">نام خود را از لیست انتخاب کنید...</option>
        </select>

        <div id="resultCard" class="result-card">
            <div class="profile-area">
                <div id="resPhotoWrap"></div>
                <div class="profile-info">
                    <h4 id="resName"></h4>
                    <span id="resStageBadge" class="stage"></span>
                </div>
            </div>
            <div class="result-grid">
                <div class="metric"><div>رتبه شما در این ماه</div><div class="metric-val" id="resRank"></div></div>
                <div class="metric"><div>امتیاز شما در این ماه</div><div class="metric-val" id="resScore"></div></div>
                <div class="metric"><div>رتبه شما در روند سالانه</div><div class="metric-val" id="resAnnualRank"></div></div>
            </div>
        </div>
    </div>

    <h3>📊 جایگاه کارشناسان در هر استیج‌</h3>
    <div class="pyramid-container" id="pyramidContainer">
        <!-- بلوک‌های استیج ۵ تا ۱ به صورت خودکار در اینجا رندر می‌شوند -->
    </div>
</div>

<!-- کتابخانه خواندن اکسل در مرورگر -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
    // ---------------------------------------------------------------
    // تنظیمات: لیست فایل‌های اکسل آرشیو شده (هر ماه یک فایل جدا)
    // فایل جدید که اضافه کردی، فقط همین‌جا یک خط اضافه کن
    // ---------------------------------------------------------------
    const AVAILABLE_MONTHS = [
        { value: "1405-04", label: "اردیبهشت 1405",   file: "1405-02.xlsx" },
        { value: "1405-03", label: "خرداد 1405", file: "1405-03.xlsx" },
        // { value: "1403-04", label: "تیر ۱۴۰۳",   file: "data/1403-04.xlsx" },
    ];
    const PHOTO_BASE_PATH = "images/"; // پوشه‌ای که عکس‌های پروفایل داخلشه

    const stagesDefinition = [
        { level: 5, text: "Top Performers", class: "stage-5" },
        { level: 4, text: "Excellent Performers", class: "stage-4" },
        { level: 3, text: "Passed", class: "stage-3" },
        { level: 2, text: "Need Improvment", class: "stage-2" },
        { level: 1, text: "Underperformers", class: "stage-1" }
    ];

    let personnelData = [];
    let rankedOrder = [];

    const pyramidContainer = document.getElementById('pyramidContainer');
    const selectDropdown = document.getElementById('userSelect');
    const monthSelect = document.getElementById('monthSelect');
    const loadStatus = document.getElementById('loadStatus');

    // پر کردن دراپ‌داون انتخاب ماه
    AVAILABLE_MONTHS.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.value;
        opt.textContent = m.label;
        monthSelect.appendChild(opt);
    });

    function getStageNumber(person) {
        if (person.forcedStage !== null && person.forcedStage !== undefined && person.forcedStage !== "") {
            return Number(person.forcedStage);
        }
        if (person.score < 400) return 1;
        if (person.score < 800) return 2;
        if (person.score < 1250) return 3;
        if (person.score < 1600) return 4;
        return 5;
    }

    function getStageInfo(person) {
        const stageNumber = getStageNumber(person);
        const definition = stagesDefinition.find(s => s.level === stageNumber);
        return definition || { text: "Unknown", class: "stage-1" };
    }

    // ساخت تگ عکس، با placeholder حرف اول اسم اگر عکس موجود نبود/لود نشد
    function buildPhotoTag(person, sizeClass) {
        const initial = (person.name || "?").trim().charAt(0);
        const src = person.photo ? (PHOTO_BASE_PATH + person.photo) : "";
        if (!src) {
            return `<div class="${sizeClass} placeholder">${initial}</div>`;
        }
        // اگر عکس پیدا نشد (404)، با onerror جایگزین حرف اول می‌شود
        return `<img class="${sizeClass}" src="${src}" alt="${person.name}"
                 onerror="this.outerHTML = '<div class=&quot;${sizeClass} placeholder&quot;>${initial}</div>'">`;
    }

    // خواندن فایل اکسل و تبدیل به آرایه اشیاء personnelData
    async function loadMonth(monthValue) {
        const monthDef = AVAILABLE_MONTHS.find(m => m.value === monthValue) || AVAILABLE_MONTHS[0];
        if (!monthDef) return;
        monthSelect.value = monthDef.value;

        loadStatus.textContent = "در حال بارگذاری اطلاعات...";
        loadStatus.classList.remove('error');

        try {
            const response = await fetch(monthDef.file);
            if (!response.ok) throw new Error("فایل پیدا نشد: " + monthDef.file);
            const arrayBuffer = await response.arrayBuffer();
            const workbook = XLSX.read(arrayBuffer, { type: "array" });
            const firstSheetName = workbook.SheetNames[0];
            const sheet = workbook.Sheets[firstSheetName];
            // sheet_to_json با هدر ردیف اول -> آرایه‌ای از آبجکت‌ها با کلید = نام ستون
            const rows = XLSX.utils.sheet_to_json(sheet, { defval: null });

            personnelData = rows.map(r => ({
                name: String(r.name ?? "").trim(),
                score: Number(r.score) || 0,
                annualRank: r.annualRank === null || r.annualRank === "" ? null : Number(r.annualRank),
                forcedStage: (r.forcedStage === null || r.forcedStage === "" || r.forcedStage === undefined)
                    ? null : Number(r.forcedStage),
                photo: r.photo ? String(r.photo).trim() : ""
            })).filter(p => p.name);

            if (personnelData.length === 0) {
                throw new Error("هیچ ردیف معتبری در اکسل پیدا نشد.");
            }

            renderDashboard();
            loadStatus.textContent = `${personnelData.length} نفر بارگذاری شد — ${monthDef.label}`;
        } catch (err) {
            console.error(err);
            loadStatus.textContent = "خطا در بارگذاری اکسل: " + err.message;
            loadStatus.classList.add('error');
        }
    }

    function renderDashboard() {
        // مرحله ۱: تعیین استیج نهایی هر فرد
        personnelData.forEach(person => {
            person.stageLevel = getStageNumber(person);
        });

        // مرحله ۲: ساخت ترتیب نهایی بر اساس استیج (۵ به ۱) سپس امتیاز داخل هر استیج
        rankedOrder = [];
        stagesDefinition.forEach(stageDef => {
            const stageUsers = personnelData
                .filter(p => p.stageLevel === stageDef.level)
                .sort((a, b) => b.score - a.score);
            rankedOrder.push(...stageUsers);
        });

        // مرحله ۳: اختصاص رتبه کلی
        rankedOrder.forEach((person, index) => {
            person.globalRank = index + 1;
        });

        pyramidContainer.innerHTML = "";
        selectDropdown.innerHTML = '<option value="">نام خود را از لیست انتخاب کنید...</option>';
        document.getElementById('resultCard').style.display = 'none';

        stagesDefinition.forEach(stageDef => {
            const stageUsers = rankedOrder.filter(p => p.stageLevel === stageDef.level);

            const block = document.createElement('div');
            block.className = 'stage-block';
            block.setAttribute('data-stage', stageDef.level);
            block.id = `stageBlock-${stageDef.level}`;

            block.innerHTML = `
                <div class="stage-block-header">
                    <span class="stage-block-title">استیج ${stageDef.level}: ${stageDef.text}</span>
                    <span class="stage ${stageDef.class}">تعداد: ${stageUsers.length} نفر</span>
                </div>
            `;

            const usersListContainer = document.createElement('div');
            usersListContainer.className = 'users-list';

            stageUsers.forEach(person => {
                const userChip = document.createElement('div');
                userChip.className = 'user-chip';
                userChip.id = `userChip-${person.globalRank}`;
                userChip.innerHTML = `
                    ${buildPhotoTag(person, 'chip-photo')}
                    <span class="rank-num">رتبه ${person.globalRank}</span>
                    <b>${person.name}</b>
                    <span class="user-score">${person.score} امتیاز</span>
                `;
                usersListContainer.appendChild(userChip);
            });

            block.appendChild(usersListContainer);
            pyramidContainer.appendChild(block);
        });

        rankedOrder.forEach((person) => {
            const option = document.createElement('option');
            option.value = person.globalRank;
            option.textContent = person.name;
            selectDropdown.appendChild(option);
        });
    }

    function showUserStatus() {
        const selectedRank = document.getElementById('userSelect').value;
        const card = document.getElementById('resultCard');

        pyramidContainer.classList.remove('has-active');
        document.querySelectorAll('.stage-block').forEach(b => b.classList.remove('active-stage'));
        document.querySelectorAll('.user-chip').forEach(c => c.classList.remove('highlighted-user'));

        if (!selectedRank) {
            card.style.display = 'none';
            return;
        }

        const person = rankedOrder.find(p => p.globalRank === Number(selectedRank));
        if (!person) {
            card.style.display = 'none';
            return;
        }
        const stageInfo = getStageInfo(person);

        document.getElementById('resPhotoWrap').innerHTML = buildPhotoTag(person, 'profile-photo');
        document.getElementById('resName').textContent = "همکار گرامی: " + person.name;

        const badge = document.getElementById('resStageBadge');
        badge.textContent = stageInfo.text;
        badge.className = `stage ${stageInfo.class}`;

        document.getElementById('resRank').textContent = `${person.globalRank} از ${rankedOrder.length}`;
        document.getElementById('resScore').textContent = person.score;
        document.getElementById('resAnnualRank').textContent = person.annualRank ? `رتبه ${person.annualRank}` : "—";

        card.style.display = 'block';

        pyramidContainer.classList.add('has-active');
        const targetBlock = document.getElementById(`stageBlock-${person.stageLevel}`);
        if (targetBlock) targetBlock.classList.add('active-stage');

        const targetChip = document.getElementById(`userChip-${person.globalRank}`);
        if (targetChip) targetChip.classList.add('highlighted-user');
    }

    // بارگذاری اولیه: آخرین ماه موجود در لیست
    if (AVAILABLE_MONTHS.length > 0) {
        loadMonth(AVAILABLE_MONTHS[AVAILABLE_MONTHS.length - 1].value);
    } else {
        loadStatus.textContent = "هیچ فایل اکسلی در لیست AVAILABLE_MONTHS تعریف نشده.";
        loadStatus.classList.add('error');
    }
</script>

</body>
</html>
