<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ورود به پنل</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>

        @import url('https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css');

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Vazirmatn;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#2563eb,#1e3a8a);
        }

        .login-box{
            width:420px;
            background:white;
            padding:40px;
            border-radius:18px;
            box-shadow:0 20px 50px rgba(0,0,0,.2);
        }

        .logo{
            font-size:55px;
            text-align:center;
            color:#2563eb;
            margin-bottom:20px;
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#2c3e50;
        }

        input{
            width:100%;
            padding:14px;
            margin-bottom:18px;
            border:1px solid #ddd;
            border-radius:10px;
            font-size:15px;
        }

        input:focus{
            outline:none;
            border-color:#2563eb;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#1d4ed8;
        }

        .error{
            color:red;
            margin-top:15px;
            text-align:center;
        }

    </style>

</head>

<body>

<div class="login-box">

    <div class="logo">
        <i class="fa-solid fa-chart-line"></i>
    </div>

    <h2>ورود به پنل شخصی</h2>

    <form method="POST">

        <input
            name="username"
            placeholder="نام کاربری"
            required>

        <input
            type="password"
            name="password"
            placeholder="رمز عبور"
            required>

        <button type="submit">
            <i class="fa-solid fa-lock"></i>
            ورود
        </button>

    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

</div>

</body>
</html>
