<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستم رتبه‌بندی ماهانه KPI</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css');
        body { font-family: Vazirmatn, sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 950px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        
        /* بخش وضعیت من */
        .search-box { background: #eef2f7; padding: 20px; border-radius: 8px; margin-bottom: 25px; }
        select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-family: inherit; font-size: 16px; box-sizing: border-box; }
        
        /* کارت مشخصات کاربر */
        .result-card { display: none; margin-top: 15px; background: #fff; padding: 20px; border-right: 5px solid #3498db; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 6px; }
        .profile-area { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        .profile-info h4 { margin: 0 0 5px 0; font-size: 18px; color: #2c3e50; }
        
        .result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; text-align: center; }
        .metric { background: #f8f9fa; padding: 12px; border-radius: 6px; border: 1px solid #e1e8ed; }
        .metric-val { font-weight: bold; color: #2c3e50; font-size: 18px; margin-top: 5px; }
        
        /* استایل استیج‌ها */
        .stage { padding: 4px 10px; border-radius: 20px; font-size: 13px; color: white; display: inline-block; text-align: center; font-weight: bold; }
        .stage-1 { background-color: #95a5a6; }
        .stage-2 { background-color: #3498db; }
        .stage-3 { background-color: #f1c40f; color: #333; }
        .stage-4 { background-color: #9b59b6; }
        .stage-5 { background-color: #199609; }
        .up { color: #2ecc71; font-weight: bold; } .down { color: #e74c3c; font-weight: bold; } .stable { color: #7f8c8d; }

        /* ساختار جدید هرمی / بلوکی */
        .pyramid-container { display: flex; flex-direction: column; gap: 15px; margin-top: 25px; transition: all 0.3s ease; }
        
        .stage-block { 
            background: #fff; 
            border-radius: 8px; 
            padding: 20px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-right: 8px solid #ccc;
            transition: all 0.3s ease;
        }
        
        /* رنگ‌بندی لبه‌ی بلوک‌ها متناسب با استیج */
        .stage-block[data-stage="5"] { border-right-color: #199609; }
        .stage-block[data-stage="4"] { border-right-color: #9b59b6; }
        .stage-block[data-stage="3"] { border-right-color: #f1c40f; }
        .stage-block[data-stage="2"] { border-right-color: #3498db; }
        .stage-block[data-stage="1"] { border-right-color: #95a5a6; }

        .stage-block-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
            border-bottom: 1px dashed #eee;
            padding-bottom: 10px;
        }
        .stage-block-title { font-size: 18px; font-weight: bold; color: #2c3e50; }
        
        .users-list { display: flex; flex-wrap: wrap; gap: 10px; }
        
        /* استایل کارت هر فرد داخل بلوک */
        .user-chip { 
            background: #f8f9fa; 
            border: 1px solid #e1e8ed; 
            padding: 8px 14px; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            gap: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .user-chip .rank-num { background: #eef2f7; border-radius: 4px; padding: 2px 6px; font-weight: bold; font-size: 12px; }
        .user-chip .user-score { color: #7f8c8d; font-size: 13px; }

        /* استایل‌های وضعیت فعال و غیرفعال (موقع انتخاب کاربر) */
        .pyramid-container.has-active .stage-block { opacity: 0.3; transform: scale(0.98); }
        .pyramid-container.has-active .stage-block.active-stage { opacity: 1; transform: scale(1); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .pyramid-container.has-active .user-chip { opacity: 0.4; }
        .pyramid-container.has-active .user-chip.highlighted-user { 
            opacity: 1; 
            background: #fff; 
            border-color: #2c3e50; 
            box-shadow: 0 0 8px rgba(0,0,0,0.15);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 تابلوی رتبه‌بندی و عملکرد کارشناسان</h1>

    <!-- بخش وضعیت من -->
    <div class="search-box">
        <h3>🔍 وضعیت من را نشان بده</h3>
        <select id="userSelect" onchange="showUserStatus()">
            <option value="">نام خود را از لیست انتخاب کنید...</option>
        </select>
        
        <!-- کارت پروفایل شخص پس از انتخاب نام -->
        <div id="resultCard" class="result-card">
            <div class="profile-area">
                <div class="profile-info">
                    <h4 id="resName"></h4>
                    <span id="resStageBadge" class="stage"></span>
                </div>
            </div>
            <div class="result-grid">
                <div class="metric"><div>رتبه شما در این ماه</div><div class="metric-val" id="resRank"></div></div>
                <div class="metric"><div>امتیاز کل</div><div class="metric-val" id="resScore"></div></div>
                <div class="metric"><div>تغییرات استیج</div><div class="metric-val" id="resChange"></div></div>
            </div>
        </div>
    </div>

    <!-- ساختار بلوکی رتبه‌بندی کلی -->
    <h3>📊 جایگاه کارشناسان در هر استیج‌</h3>
    <div class="pyramid-container" id="pyramidContainer">
        <!-- بلوک‌های استیج ۵ تا ۱ به صورت خودکار در اینجا رندر می‌شوند -->
    </div>
</div>

<script>
    const personnelData = [
        { name: "حسین حیدرهائی", score: 1212, change: "+2", forcedStage: 5 },
        { name: "الهه موسوی", score: 570, change: "+2", forcedStage: 3 },
        { name: "امیرحسین هوائی", score: 1471, change: "+1", forcedStage: null },
        { name: "مریم حلاجیان", score: 389, change: "-3", forcedStage: 2 }, 
        { name: "سمیه یوسفی", score: 840, change: "0", forcedStage: null },
        { name: "بهزاد عطیفه پور", score: 705, change: "-1", forcedStage: 3 },
        { name: "مینا عسگری", score: 1191, change: "-2", forcedStage: null },
        { name: "معصومه آقایی", score: 678, change: "0", forcedStage: 3 },
        { name: "سارا سیدمحمود", score: 369, change: "0", forcedStage: null },
        { name: "محمد طالبی", score: 241, change: "-2", forcedStage: null },
        { name: "سهراب کاوس نژاد", score: 971, change: "-2", forcedStage: null },
        { name: "امید نعمتی", score: 3514, change: "+2", forcedStage: null },
        { name: "مهرداد سمیعی فرد", score: 303, change: "+1", forcedStage: null },
        { name: "محمدمهدی زارع", score: 689, change: "+1", forcedStage: 4 },
        { name: "امیرحسین رحیمی", score: 1746, change: "+1", forcedStage: 5 },
    ];

    // تعریف اطلاعات ثابت استیج‌ها به ترتیب هرمی (از بالا به پایین)
    const stagesDefinition = [
        { level: 5, text: "Top Performers", class: "stage-5" },
        { level: 4, text: "Excellent Performers", class: "stage-4" },
        { level: 3, text: "Passed", class: "stage-3" },
        { level: 2, text: "Need Improvment", class: "stage-2" },
        { level: 1, text: "Underperformers", class: "stage-1" }
    ];

    function getStageNumber(person) {
        if (person.forcedStage !== null && person.forcedStage !== undefined) {
            return person.forcedStage;
        }
        if (person.score < 400) return 1;
        if (person.score < 800) return 2;
        if (person.score < 1250) return 3;
        if (person.score < 1600) return 4;
        return 5;
    }

    function getStageInfo(person) {
        const stageNumber = getStageNumber(person);
        const definition = stagesDefinition.find(s => s.level === stageNumber);
        return definition || { text: "Unknown", class: "stage-1" };
    }

    // مرحله ۱: تعیین استیج نهایی هر فرد (با در نظر گرفتن forcedStage)
    personnelData.forEach(person => {
        person.stageLevel = getStageNumber(person);
    });

    // مرحله ۲: ساخت ترتیب نهایی رتبه‌بندی بر اساس استیج (۵ به ۱) و سپس امتیاز داخل هر استیج
    // این همان ترتیبی است که در بلوک‌های هرمی نمایش داده می‌شود، پس رتبه‌ها باید از همین آرایه گرفته شوند
    // نه از یک مرتب‌سازی سراسری بر اساس امتیاز که forcedStage را نادیده می‌گیرد.
    const rankedOrder = [];
    stagesDefinition.forEach(stageDef => {
        const stageUsers = personnelData
            .filter(p => p.stageLevel === stageDef.level)
            .sort((a, b) => b.score - a.score);
        rankedOrder.push(...stageUsers);
    });

    // مرحله ۳: اختصاص رتبه کلی بر اساس موقعیت در rankedOrder (نه بر اساس امتیاز خام)
    rankedOrder.forEach((person, index) => {
        person.globalRank = index + 1;
    });

    const pyramidContainer = document.getElementById('pyramidContainer');
    const selectDropdown = document.getElementById('userSelect');

    pyramidContainer.innerHTML = "";
    selectDropdown.innerHTML = '<option value="">نام خود را از لیست انتخاب کنید...</option>';

    // رندر کردن بلوک‌های هرمی (از استیج ۵ به سمت استیج ۱)
    stagesDefinition.forEach(stageDef => {
        // به جای فیلتر و مرتب‌سازی مجدد، از rankedOrder استفاده می‌کنیم تا با شماره رتبه‌ها هماهنگ باشد
        const stageUsers = rankedOrder.filter(p => p.stageLevel === stageDef.level);

        if (stageUsers.length >= 0) { // حتی اگر استیجی کاربر نداشت، بلوک آن ساخته می‌شود
            const block = document.createElement('div');
            block.className = 'stage-block';
            block.setAttribute('data-stage', stageDef.level);
            block.id = `stageBlock-${stageDef.level}`;

            const header = `
                <div class="stage-block-header">
                    <span class="stage-block-title">استیج ${stageDef.level}: ${stageDef.text}</span>
                    <span class="stage ${stageDef.class}">تعداد: ${stageUsers.length} نفر</span>
                </div>
            `;
            block.innerHTML = header;

            const usersListContainer = document.createElement('div');
            usersListContainer.className = 'users-list';

            stageUsers.forEach(person => {
                let changeIcon = person.change.includes("+") ? "▲" : (person.change.includes("-") ? "▼" : "•");
                let changeClass = person.change.includes("+") ? "up" : (person.change.includes("-") ? "down" : "stable");

                const userChip = document.createElement('div');
                userChip.className = 'user-chip';
                userChip.id = `userChip-${person.globalRank}`;
                userChip.innerHTML = `
                    <span class="rank-num">رتبه ${person.globalRank}</span>
                    <b>${person.name}</b>
                    <span class="user-score">${person.score} امتیاز</span>
                    <span class="${changeClass}" style="font-size:12px;">${changeIcon} ${person.change}</span>
                `;
                usersListContainer.appendChild(userChip);
            });

            block.appendChild(usersListContainer);
            pyramidContainer.appendChild(block);
        }
    });

    // پر کردن دراپ‌داون بر اساس رتبه کلی جدید (rankedOrder)
    rankedOrder.forEach((person) => {
        const option = document.createElement('option');
        option.value = person.globalRank; 
        option.textContent = person.name;
        selectDropdown.appendChild(option);
    });

    // نمایش وضعیت اختصاصی فرد و مدیریت فعال/غیرفعال‌سازی بلوک‌ها
    function showUserStatus() {
        const selectedRank = document.getElementById('userSelect').value;
        const card = document.getElementById('resultCard');
        
        // پاک کردن استایل‌های فعال قبلی
        pyramidContainer.classList.remove('has-active');
        document.querySelectorAll('.stage-block').forEach(b => b.classList.remove('active-stage'));
        document.querySelectorAll('.user-chip').forEach(c => c.classList.remove('highlighted-user'));

        if (!selectedRank) {
            card.style.display = 'none';
            return;
        }

        // پیدا کردن فرد بر اساس globalRank جدید (به جای اندیس آرایه اصلی)
        const person = rankedOrder.find(p => p.globalRank === Number(selectedRank));
        if (!person) {
            card.style.display = 'none';
            return;
        }
        const stageInfo = getStageInfo(person);
        
        let changeClass = "stable";
        if (person.change.includes("+")) changeClass = "up";
        if (person.change.includes("-")) changeClass = "down";

        // قرار دادن نام همکار در کارت مشخصات بالا
        document.getElementById('resName').textContent = "همکار گرامی: " + person.name;
        
        // تنظیم دکمه استیج در کارت مشخصات بالا
        const badge = document.getElementById('resStageBadge');
        badge.textContent = stageInfo.text;
        badge.className = `stage ${stageInfo.class}`;

        // مقداردهی بخش رتبه و امتیاز در کارت مشخصات بالا
        document.getElementById('resRank').textContent = `${person.globalRank} از ${rankedOrder.length}`;
        document.getElementById('resScore').textContent = person.score;
        
        // مقداردهی بخش تغییرات در کارت مشخصات بالا
        const changeElem = document.getElementById('resChange');
        changeElem.textContent = person.change;
        changeElem.className = `metric-val ${changeClass}`;

        card.style.display = 'block';

        // ---- منطق فعال‌سازی بلوک هرم ----
        pyramidContainer.classList.add('has-active'); // اعمال حالت نیمه‌شفاف برای همه چیز
        
        // فعال کردن بلوک استیج مربوط به این شخص
        const targetBlock = document.getElementById(`stageBlock-${person.stageLevel}`);
        if (targetBlock) {
            targetBlock.classList.add('active-stage');
        }

        // هایلایت کردن کارت اختصاصی شخص در داخل آن بلوک
        const targetChip = document.getElementById(`userChip-${person.globalRank}`);
        if (targetChip) {
            targetChip.classList.add('highlighted-user');
        }
    }
</script>

</body>
</html>
